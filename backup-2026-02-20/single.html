
{{/* Tekstseksjonen bruker nå layouts/_default/single.html */}}


{{ define "title" }}{{ .Title }} – Flytsonen{{ end }}

{{ define "main" }}
  <article class="article-page">
    <h1 class="article-title">{{ .Title }}</h1>

    <div class="article-body">
      {{ .Content }}
    </div>

    <nav class="article-nav">
      {{ if .PrevInSection }}
        <a class="article-nav-prev" href="{{ .PrevInSection.Permalink }}">←</a>
      {{ end }}
      {{ if .NextInSection }}
        <a class="article-nav-next" href="{{ .NextInSection.Permalink }}">→</a>
      {{ end }}
    </nav>
  </article>
{{ end }}
