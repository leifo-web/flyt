<!DOCTYPE html>
<html lang="nb-no" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} – Flytsonen{{ end }}</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">

    <link rel="stylesheet" href="{{ "styles.css" | relURL }}">
  </head>

  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <div class="logo">
          <a href="{{ .Site.BaseURL }}">
            <img src="{{ "logo.svg" | relURL }}" alt="flytsonen-logo">
          </a>
        </div>

        <nav class="main-nav">
          <a href="{{ "/" | relURL }}">hjem</a>
          <a href="{{ "om/" | relURL }}">om</a>
          <a href="{{ "arkiv/" | relURL }}">tekst</a>
          <a href="{{ "borsen/" | relURL }}">børsen</a>
          <button class="theme-toggle" type="button" aria-label="Bytt tema">
            <span class="theme-icon theme-icon-sun">☀️</span>
            <span class="theme-icon theme-icon-moon">🌙</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="page">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
      <p>© 2009 Flytsonen</p>
    </footer>

    <script>
      (function () {
        var root = document.documentElement;
        var toggle = document.querySelector('.theme-toggle');
        var storageKey = 'theme';

        function getPreferredTheme() {
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            return 'dark';
          }
          return 'light';
        }

        function getStoredTheme() {
          try {
            return sessionStorage.getItem(storageKey);
          } catch (error) {
            return null;
          }
        }

        function storeTheme(value) {
          try {
            sessionStorage.setItem(storageKey, value);
          } catch (error) {}
        }

        function applyTheme(theme) {
          root.setAttribute('data-theme', theme);
        }

        var storedTheme = getStoredTheme();
        applyTheme(storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : getPreferredTheme());

        if (toggle) {
          toggle.addEventListener('click', function () {
            var current = root.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            storeTheme(next);
          });
        }
      })();
    </script>
  </body>
</html>
